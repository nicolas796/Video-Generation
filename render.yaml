services:
  # Web Service Configuration
  - type: web
    name: product-video-generator
    runtime: python
    plan: standard  # Upgrade to 'starter' or higher for production
    
    # Build and start commands
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gevent --workers 2 --timeout 300 --keep-alive 5 --max-requests 1000"
    
    # Health check endpoint
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      # Python version - using 3.11 for compatibility with Pillow wheels
      - key: PYTHON_VERSION
        value: "3.11.9"
      
      # Auto-set by Render
      - key: DATABASE_URL
        fromDatabase:
          name: product-video-db
          property: connectionString
      
      - key: FLASK_ENV
        value: production
      
      - key: FLASK_DEBUG
        value: "false"
      
      - key: APP_BASE_URL
        value: https://product-video-generator.onrender.com  # Will be updated with actual URL
      
      # Render Disk configuration (persistent storage)
      - key: RENDER_DISK_MOUNT_PATH
        value: /var/data
      
      # Secrets (set these in Render Dashboard after first deploy)
      - key: SECRET_KEY
        generateValue: true
      
      - key: POLLO_API_KEY
        sync: false  # Must be set manually in dashboard
      
      - key: ELEVENLABS_API_KEY
        sync: false
      
      - key: MOONSHOT_API_KEY
        sync: false
      
      - key: POLLO_WEBHOOK_SECRET
        sync: false
      
      - key: ADMIN_USERNAME
        value: admin
      
      - key: ADMIN_PASSWORD
        generateValue: true
    
    # Auto-deploy on git push
    autoDeploy: true
    
    # Persistent disk for video uploads
    # Files survive deploys and restarts
    disk:
      name: video-uploads
      mountPath: /var/data
      sizeGB: 10

# PostgreSQL Database
databases:
  - name: product-video-db
    plan: free  # Upgrade to 'starter' for production
    databaseName: product_video_db
    user: product_video_user
